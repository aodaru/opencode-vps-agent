# ============================================================
# Cloudflare Tunnel - Ingress Rules
# Autenticacion via token (no credentials-file)
# ============================================================
ingress:
  # Web UI de OpenCode
  - hostname: opencode.adalgarcia.com
    service: http://localhost:4096

  # SSH tunneled (via Cloudflare Access)
  - hostname: ssh.adalgarcia.com
    service: ssh://localhost:22

  # Catch-all (requerido)
  - service: http_status:404
