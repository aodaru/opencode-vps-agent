services:
  opencode-vps:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencode-vps
    hostname: opencode-vps
    restart: unless-stopped
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - GH_TOKEN=${GH_TOKEN}
      # Si usas un proxy corporativo:
      # - HTTPS_PROXY=http://proxy.example.com:8080
      # - NO_PROXY=localhost,127.0.0.1
    volumes:
      # Bind mounts a ./data/ en el host (NO named volumes).
      # Esto garantiza que toda la data sobrevive a `docker compose down -v`
      # y es respaldable con `tar -czf backup.tar.gz ./data/`.
      #
      # Bootstrap: ./scripts/init-data.sh (idempotente).
      # Migracion desde named volumes antiguos: ./scripts/migrate-volumes.sh (one-shot).
      #
      # Estructura: ver tabla "Persistencia en host" en AGENTS.md.

      # Auth de OpenCode (auth.json con opencode-go API key)
      - ./data/opencode-auth:/home/cloud/.local/share/opencode
      # Config editable de OpenCode
      - ./data/opencode-config:/home/cloud/.config/opencode
      # Auth de gh CLI (hosts.yml)
      - ./data/gh-config:/home/cloud/.config/gh
      # Credenciales y config del Cloudflare Tunnel
      - ./data/cloudflared:/home/cloud/.cloudflared
      # SSH keys del usuario cloud
      - ./data/ssh-cloud:/home/cloud/.ssh
      # SSH keys del usuario devadmin (NUEVO en este fix)
      - ./data/ssh-devadmin:/home/devadmin/.ssh
      # Proyectos y codigo fuente del agente
      - ./data/proyectos:/home/cloud/proyectos
    ports:
      # Puerto 4096 para Cloudflare Tunnel en el host
      - "4096:4096"
      # Puerto 22 solo para acceso SSH directo (fallback)
      # Si usas Cloudflare Tunnel exclusivamente, puedes quitar esta linea
      - "2222:22"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4096"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - opencode-net

networks:
  opencode-net:
    driver: bridge
