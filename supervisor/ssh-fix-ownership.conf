[program:ssh-fix-ownership]
command=/usr/local/bin/fix-ssh-ownership.sh
user=root
autostart=true
autorestart=false
startsecs=0
startretries=1
exitcodes=0
priority=1
stdout_logfile=/var/log/ssh-fix-ownership.log
stderr_logfile=/var/log/ssh-fix-ownership.err
stdout_logfile_maxbytes=1MB
stderr_logfile_maxbytes=1MB
